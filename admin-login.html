<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=0.8, user-scalable=no">
    <title>管理者ログイン - みんなで作るコスイベリスト！</title>
    <link rel="icon" href="ico/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>管理者ログイン</h1>
    <a href="index.html" class="nav-link">← イベント一覧へ戻る</a>

    <div class="card">
        <h2>ログイン</h2>
        <input type="email" id="email" placeholder="メールアドレス" autocomplete="email">
        <input type="password" id="password" placeholder="パスワード" autocomplete="current-password">
        <button id="btnLogin">ログイン</button>
    </div>

    <!-- Custom Alert Modal -->
    <div id="custom-alert-overlay" class="custom-modal-overlay" style="display: none;">
        <div class="custom-modal-box">
            <p id="custom-alert-message" class="custom-modal-message"></p>
            <div class="custom-modal-buttons">
                <button id="custom-alert-ok">OK</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLvko7-HHZQVQCE_ChrCgG6FlSbL3LILU",
            authDomain: "n-cosschedule.firebaseapp.com",
            projectId: "n-cosschedule",
            storageBucket: "n-cosschedule.firebasestorage.app",
            messagingSenderId: "280035863247",
            appId: "1:280035863247:web:2f1da14c13061f1bc8e5ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- Custom Modals ---
        function customAlert(message) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('custom-alert-overlay');
                const messageP = document.getElementById('custom-alert-message');
                const okBtn = document.getElementById('custom-alert-ok');

                messageP.textContent = message;
                overlay.style.display = 'flex';

                const close = () => {
                    overlay.style.display = 'none';
                    okBtn.onclick = null;
                    resolve();
                };

                okBtn.onclick = close;
            });
        }

        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                await customAlert("メールアドレスとパスワードを入力してください。");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                await customAlert("ログインに成功しました。");
                window.location.href = 'index.html'; // トップページへ移動
            } catch (error) {
                console.error("Login failed:", error);
                await customAlert("ログインに失敗しました。メールアドレスまたはパスワードが間違っています。");
            }
        };
    </script>

</body>
</html>
